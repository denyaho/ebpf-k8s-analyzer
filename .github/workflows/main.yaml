name: CI
on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install eBPF dependencies
              run: |
                sudo apt-get update
                sudo apt-get install -y clang llvm libelf-dev libpcap-dev linux-headers-generic
            - uses: actions/setup-go@v5
              with:
                go-version: '1.24'
            - name: Go Build
              run: go build ./cmd/analyzer/